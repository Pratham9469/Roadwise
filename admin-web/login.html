<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadWise | Civic Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            display: flex;
            height: 100vh;
            width: 100vw;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .logo-box {
            width: 56px; height: 56px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            color: var(--dark);
        }

        p.subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            background: #f9fafb;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }

        .btn-primary:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 6px 10px rgba(16, 185, 129, 0.3);
        }

        .btn-google {
            background: white;
            color: #374151;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .toggle-text {
            font-size: 13px;
            color: #6b7280;
            margin-top: 10px;
        }

        .toggle-text a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: var(--danger);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            min-height: 18px;
            display: none;
        }

    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-box">RW</div>
    <h1 id="form-title">Welcome Back</h1>
    <p class="subtitle" id="form-subtitle">Log in to the Civic Maintenance Dashboard</p>

    <div id="error-msg">Error message goes here</div>

    <form id="auth-form" onsubmit="event.preventDefault(); handleAuth();">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="admin@roadwise.com">
        </div>
        <div class="input-group" style="position: relative;">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••" style="padding-right: 40px;">
            <div id="toggle-password" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 28px; cursor: pointer; color: #6b7280; padding: 4px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">OR</div>

    <button class="btn btn-google" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" height="20" alt="Google">
        Continue with Google
    </button>

    <p class="toggle-text" id="toggle-container">
        Don't have an account? <a onclick="toggleMode()">Sign up here</a>
    </p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCLqpE2lSlor9X55Cfold-5ozfDp25Sm3s",
    authDomain: "roadwise-eb377.firebaseapp.com",
    projectId: "roadwise-eb377",
    storageBucket: "roadwise-eb377.firebasestorage.app",
    messagingSenderId: "49371864924",
    appId: "1:49371864924:web:ab0815f16a8f3df94deb99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

let isLoginMode = true;

// Check if user is already logged in
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html"; // Go to dashboard if already logged in
    }
});

function showError(msg) {
    const err = document.getElementById('error-msg');
    err.innerText = msg;
    err.style.display = 'block';
}

window.toggleMode = () => {
    isLoginMode = !isLoginMode;
    document.getElementById('error-msg').style.display = 'none';
    const title = document.getElementById('form-title');
    const subtitle = document.getElementById('form-subtitle');
    const btn = document.getElementById('submit-btn');
    const toggleContainer = document.getElementById('toggle-container');

    if (isLoginMode) {
        title.innerText = "Welcome Back";
        subtitle.innerText = "Log in to the Civic Maintenance Dashboard";
        btn.innerText = "Sign In";
        toggleContainer.innerHTML = `Don't have an account? <a onclick="toggleMode()">Sign up here</a>`;
    } else {
        title.innerText = "Create Account";
        subtitle.innerText = "Join the Civic Maintenance Dashboard";
        btn.innerText = "Sign Up";
        toggleContainer.innerHTML = `Already have an account? <a onclick="toggleMode()">Log in here</a>`;
    }
};

window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');

    try {
        btn.disabled = true;
        btn.innerText = isLoginMode ? "Signing In..." : "Creating Account...";
        document.getElementById('error-msg').style.display = 'none';

        if (isLoginMode) {
            await signInWithEmailAndPassword(auth, email, password);
        } else {
            await createUserWithEmailAndPassword(auth, email, password);
        }
        
        // Let onAuthStateChanged handle the redirect
    } catch (error) {
        showError(error.message.replace("Firebase: ", ""));
        btn.disabled = false;
        btn.innerText = isLoginMode ? "Sign In" : "Sign Up";
    }
};

window.signInWithGoogle = async () => {
    try {
        document.getElementById('error-msg').style.display = 'none';
        await signInWithPopup(auth, googleProvider);
        // Let onAuthStateChanged handle the redirect
    } catch (error) {
        showError(error.message.replace("Firebase: ", ""));
    }
};

window.togglePasswordVisibility = () => {
    const pwdInput = document.getElementById('password');
    const eyeIconBox = document.getElementById('toggle-password');
    if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        eyeIconBox.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
    } else {
        pwdInput.type = 'password';
        eyeIconBox.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    }
};
</script>
</body>
</html>
