<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadWise | Civic Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-card">
    <div class="logo-box">RW</div>
    <h1 id="form-title">Welcome Back</h1>
    <p class="subtitle" id="form-subtitle">Log in to the Civic Maintenance Dashboard</p>

    <div id="error-msg">Error message goes here</div>

    <form id="auth-form" onsubmit="event.preventDefault(); handleAuth();">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="admin@roadwise.com">
        </div>
        <div class="input-group" style="position: relative;">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••" style="padding-right: 40px;">
            <div id="toggle-password" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 28px; cursor: pointer; color: #6b7280; padding: 4px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">OR</div>

    <button class="btn btn-google" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" height="20" alt="Google">
        Continue with Google
    </button>

    <p class="toggle-text" id="toggle-container">
        Don't have an account? <a onclick="toggleMode()">Sign up here</a>
    </p>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
